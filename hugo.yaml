baseURL: 'https://wishingcat.github.io/'
languageCode: 'en-us'
defaultContentLanguage: 'en'
title: 'Zengji Tu'
theme: 'hermit-v2'
enableRobotsTXT: true
hasCJKLanguage: false
rssLimit: 10
copyright: 'Zengji Tu'

frontmatter:
  date:
    - date
    - publishDate
    - lastmod
  lastmod:
    - lastmod
    - ':git'
    - date
    - publishDate
  publishDate:
    - publishDate
    - date
  expiryDate:
    - expiryDate

taxonomies:
  tag: tags

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: github-dark
    lineNos: false

author:
  name: 'Zengji Tu'
  about: 'Undergrad student, Beijing Medical University.'

params:
  description: 'Undergrad student at Beijing Medical University.'
  homeSubtitle: 'Undergrad student, Beijing Medical University.'
  themeColor: '#2c2621'
  accentColor: '#d59a78'
  footerCopyright: 'Zengji Tu'
  justifyContent: false
  relatedPosts: false
  code_copy_button: true
  homeSubtitlePrinter: true
  scrollToTop: true
  global_mathjax: false
  readTime: true
  readTimeSeparator: 'min read'
  shareSocial: true
  listLayout:
    - description
    - tags
  gallery:
    enable: true
    thumbnail: '300'
  dateform:
    CopyrightDate: '2006'
    LongDate: '2006-01-02'
    ShortDate: '01-02'
    NumDateShort: '2006-01-02'
    NumDateLong: '2006-01-02 15:04 -0700'
  socialLinks:
    - name: email
      url: 'mailto:tuzengji@stu.pku.edu.cn'

menu:
  main:
    - name: About
      url: /about/
      weight: 10
