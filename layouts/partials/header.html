<header class="site-header">
  <div class="brand-block">
    <a class="brand" href="{{ `/` | relURL }}">{{ site.Title }}</a>
    <p class="brand-subtitle">{{ site.Params.description }}</p>
  </div>
  <nav class="site-nav" aria-label="主导航">
    {{ range site.Menus.main }}
      <a href="{{ .URL }}">{{ .Name }}</a>
    {{ end }}
  </nav>
</header>
