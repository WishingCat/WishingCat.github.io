{{ define "main" }}
  <article class="card article-card">
    <header class="article-header">
      <p class="meta">{{ .Date.Format "2006-01-02" }}</p>
      <h1>{{ .Title }}</h1>
      {{ with .Params.description }}
        <p class="article-description">{{ . }}</p>
      {{ end }}
      {{ with .Params.tags }}
        <div class="tag-row">
          {{ range . }}
            <span class="tag">#{{ . }}</span>
          {{ end }}
        </div>
      {{ end }}
    </header>
    <div class="article-content">
      {{ .Content }}
    </div>
  </article>
{{ end }}
